name: Feedback Collector

on:
  schedule:
    - cron: "*/5 * * * *"  # каждые 5 минут
  workflow_dispatch:

jobs:
  feedback:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Кэшируем зависимости
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Устанавливаем зависимости
        run: pip install -r requirements.txt

      - name: Восстанавливаем состояние обратной связи
        uses: actions/cache@v4
        with:
          path: |
            feedback.json
            pending.json
            telegram_offset.json
          key: feedback-state-${{ github.run_id }}
          restore-keys: feedback-state-

      - name: Создаём google_credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_credentials.json

      - name: Собираем обратную связь и обновляем таблицу
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          from dotenv import load_dotenv; load_dotenv()
          import feedback, sheets
          n = feedback.collect_feedback()
          print(f'Новых записей: {n}')
          sheets.sync()
          "
